que pronto" works as a warm fixed phrase. "Cuídense" is the "take care" you say to a group.',roleplay:[{id:"af-r1",prompt:"Te extrañamos mucho por aquí.",promptEn:"We miss you a lot here.",accept:["yo tambien los extraño los quiero un monton","yo tambien los extraño","los extraño los quiero un monton"],hint:"Say you miss them and love them too."},{id:"af-r2",prompt:"¿Cuándo te volvemos a ver?",promptEn:"When will we see you again?",accept:["espero que pronto les mando muchos saludos","espero que pronto","pronto espero les mando saludos"],hint:"Say you hope soon and send your regards."},{id:"af-r3",prompt:"Dale un abrazo a todos de mi parte.",promptEn:"Give everyone a hug for me.",accept:["claro que si un beso cuidense","claro que si","claro un beso cuidense"],hint:"Agree and say a warm goodbye."}],shadowing:["af-1","af-2","af-4","af-6"]},cf={id:"almuerzo",tier:1,cefr:"A1",title:"El almuerzo",goal:"Order the set lunch (almuerzo) — the everyday Ecuadorian meal — and ask what's included.",culture:'The "almuerzo" is a fixed-price set lunch found everywhere in Ecuador (often $2.50–$4). It usually includes a soup (sopa), a main (segundo) with rice, and a fresh juice (jugo). Just ask "¿Qué hay de almuerzo?"',dialogue:[{id:"a-1",speaker:"them",es:"Buenas, ¿qué va a servirse?",en:"Hello, what will you have?",note:'"servirse" is a polite Ecuadorian way to say "to eat/have".'},{id:"a-2",speaker:"you",es:"¿Qué hay de almuerzo?",en:"What's for lunch (today)?"},{id:"a-3",speaker:"them",es:"Hay sopa de pollo y segundo de carne con arroz.",en:"There's chicken soup and a beef main with rice."},{id:"a-4",speaker:"you",es:"Deme un almuerzo, por favor. ¿Con qué viene el jugo?",en:"Give me one set lunch, please. What's the juice?"},{id:"a-5",speaker:"them",es:"El jugo es de mora. ¿Algo más?",en:"The juice is blackberry. Anything else?"},{id:"a-6",speaker:"you",es:"Nada más, gracias. ¿Cuánto es?",en:"Nothing else, thanks. How much is it?"},{id:"a-7",speaker:"them",es:"Son tres dólares.",en:"It's three dollars."}],chunks:[{id:"a-c1",es:"¿Qué hay de almuerzo?",en:"What's for lunch (today)?"},{id:"a-c2",es:"Deme un almuerzo, por favor",en:"Give me one set lunch, please"},{id:"a-c3",es:"¿Algo más?",en:"Anything else?"},{id:"a-c4",es:"Nada más, gracias",en:"Nothing else, thanks"},{id:"a-c5",es:"¿Cuánto es?",en:"How much is it?"}],vocab:[{id:"a-v1",es:"el almuerzo",en:"set lunch",pos:"n."},{id:"a-v2",es:"la sopa",en:"soup",pos:"n."},{id:"a-v3",es:"el segundo",en:"main course",pos:"n."},{id:"a-v4",es:"el arroz",en:"rice",pos:"n."},{id:"a-v5",es:"el jugo",en:"juice",pos:"n."},{id:"a-v6",es:"la carne",en:"meat / beef",pos:"n."},{id:"a-v7",es:"el pollo",en:"chicken",pos:"n."},{id:"a-v8",es:"por favor",en:"please",pos:"phrase"}],grammarNote:`"Deme" is the polite (usted) command of "dar" (to give) — "give me". It's the workhorse for ordering: "Deme un café", "Deme dos panes". The informal (tú) version is "Dame".`,roleplay:[{id:"a-r1",prompt:"Buenas, ¿qué va a servirse?",promptEn:"Hello, what will you have?",accept:["que hay de almuerzo","deme un almuerzo por favor","un almuerzo por favor"],hint:"Ask what's for lunch, or just order an almuerzo."},{id:"a-r2",prompt:"El jugo es de mora. ¿Algo más?",promptEn:"The juice is blackberry. Anything else?",accept:["nada mas gracias","no nada mas gracias","eso es todo gracias"],hint:'Say "nothing else, thanks".'},{id:"a-r3",prompt:"Son tres dólares.",promptEn:"It's three dollars.",accept:["aqui tiene","aqui tiene gracias","gracias aqui esta"],hint:'Hand over the money: "Aquí tiene."'}],shadowing:["a-2","a-4","a-6"]},uf={id:"charla",tier:2,cefr:"A2",title:"Charla rápida",goal:"Make small talk: where you're from, what you do, and how you like Ecuador.",culture:'Ecuadorians are warm and curious with visitors. Expect "¿De dónde eres?" and "¿Te gusta el Ecuador?" early on. Saying you find it "chévere" or "lindo" goes a long way. Note many say "el Ecuador" with the article.',dialogue:[{id:"c-1",speaker:"them",es:"¿De dónde eres?",en:"Where are you from?"},{id:"c-2",speaker:"you",es:"Soy de Estados Unidos, de California.",en:"I'm from the United States, from California."},{id:"c-3",speaker:"them",es:"¡Qué bueno! ¿A qué te dedicas?",en:"How nice! What do you do (for work)?"},{id:"c-4",speaker:"you",es:"Trabajo en tecnología. ¿Y tú?",en:"I work in tech. And you?"},{id:"c-5",speaker:"them",es:"Soy profesora. ¿Y te gusta el Ecuador?",en:"I'm a teacher. And do you like Ecuador?"},{id:"c-6",speaker:"you",es:"Me encanta. La gente es muy amable.",en:"I love it. The people are very kind."},{id:"c-7",speaker:"them",es:"¡Qué chévere! Bienvenido.",en:"How cool! Welcome."}],chunks:[{id:"c-c1",es:"¿De dónde eres?",en:"Where are you from?"},{id:"c-c2",es:"Soy de…",en:"I'm from…"},{id:"c-c3",es:"¿A qué te dedicas?",en:"What do you do (for work)?"},{id:"c-c4",es:"Me encanta",en:"I love it"},{id:"c-c5",es:"La gente es muy amable",en:"The people are very kind"}],vocab:[{id:"c-v1",es:"dónde",en:"where",pos:"adv."},{id:"c-v2",es:"trabajar",en:"to work",pos:"v."},{id:"c-v3",es:"la gente",en:"people",pos:"n."},{id:"c-v4",es:"amable",en:"kind / friendly",pos:"adj."},{id:"c-v5",es:"lindo",en:"lovely / pretty",pos:"adj."},{id:"c-v6",es:"gustar",en:"to please (to like)",pos:"v."},{id:"c-v7",es:"bienvenido",en:"welcome",pos:"adj."}],grammarNote:'"Me gusta / me encanta" literally mean "it pleases me / it delights me", so the thing liked is the subject: "me gusta el café" (coffee pleases me). For plurals: "me gustan los tacos". "Me encanta" is a stronger, very natural way to say you love something.',roleplay:[{id:"c-r1",prompt:"¿De dónde eres?",promptEn:"Where are you from?",accept:["soy de estados unidos","soy de california","soy de estados unidos de california"],hint:'Use "Soy de…" + your country/city.'},{id:"c-r2",prompt:"¿A qué te dedicas?",promptEn:"What do you do for work?",accept:["trabajo en tecnologia","trabajo en tecnologia y tu","soy ingeniero"],hint:'Use "Trabajo en…" + your field.'},{id:"c-r3",prompt:"¿Y te gusta el Ecuador?",promptEn:"And do you like Ecuador?",accept:["me encanta la gente es muy amable","me encanta","si me encanta"],hint:"Say you love it; the people are kind."}],shadowing:["c-2","c-4","c-6"]},df={id:"clima",tier:2,cefr:"A2",title:"El clima y cómo te sientes",goal:"Talk about the weather and how you're feeling.",culture:`Ecuador's weather depends on the region: the sierra (highlands) is cool, the costa is hot. A warm Ecuadorian morning greeting is "¿Cómo amaneciste?" — literally "how did you wake up?".`,dialogue:[{id:"w-1",speaker:"them",es:"¿Cómo amaneciste?",en:"How are you this morning?"},{id:"w-2",speaker:"you",es:"Bien, gracias. Aunque hace un poco de frío.",en:"Good, thanks. Although it's a little cold."},{id:"w-3",speaker:"them",es:"Sí, en la sierra siempre hace fresco en la mañana.",en:"Yes, in the highlands it's always cool in the morning."},{id:"w-4",speaker:"you",es:"¿Va a llover hoy?",en:"Is it going to rain today?"},{id:"w-5",speaker:"them",es:"Creo que sí, está nublado.",en:"I think so, it's cloudy."},{id:"w-6",speaker:"you",es:"Entonces llevo paraguas.",en:"Then I'll take an umbrella."}],chunks:[{id:"w-c1",es:"¿Cómo amaneciste?",en:"How are you this morning?"},{id:"w-c2",es:"hace frío / hace calor",en:"it's cold / it's hot"},{id:"w-c3",es:"¿Va a llover?",en:"Is it going to rain?"},{id:"w-c4",es:"está nublado",en:"it's cloudy"},{id:"w-c5",es:"creo que sí",en:"I think so"}],vocab:[{id:"w-v1",es:"el frío",en:"cold",pos:"n."},{id:"w-v2",es:"el calor",en:"heat",pos:"n."},{id:"w-v3",es:"llover",en:"to rain",pos:"v."},{id:"w-v4",es:"nublado",en:"cloudy",pos:"adj."},{id:"w-v5",es:"el paraguas",en:"umbrella",pos:"n."},{id:"w-v6",es:"la sierra",en:"highlands",pos:"n."},{id:"w-v7",es:"fresco",en:"cool / fresh",pos:"adj."}],grammarNote:`Weather usually uses "hacer": "hace frío / calor / sol / viento". But cloudiness uses "estar": "está nublado". For the near future, use "ir a" + infinitive: "va a llover" (it's going to rain), "voy a llevar" (I'm going to take).`,roleplay:[{id:"w-r1",prompt:"¿Cómo amaneciste?",promptEn:"How are you this morning?",accept:["bien gracias aunque hace un poco de frio","bien gracias","bien gracias hace frio"],hint:"Say you're good, but mention it's a bit cold."},{id:"w-r2",prompt:"Hoy hace bastante calor, ¿no?",promptEn:"It's pretty hot today, right?",accept:["si hace mucho calor","si bastante calor","si hace calor"],hint:"Agree that it's hot."},{id:"w-r3",prompt:"Creo que sí, está nublado.",promptEn:"I think so, it's cloudy.",accept:["entonces llevo paraguas","entonces llevo un paraguas","voy a llevar paraguas"],hint:"Say then you'll take an umbrella."}],shadowing:["w-1","w-2","w-4"]},ff={id:"direcciones",tier:1,cefr:"A1",title:"Pedir indicaciones",goal:"Ask where something is on foot, and understand simple directions.",culture:'In Ecuador distance is counted in "cuadras" (city blocks). "¿Dónde queda…?" is the natural way to ask where a place is. "A la vuelta" means "just around the corner".',dialogue:[{id:"d-1",speaker:"you",es:"Disculpe, ¿dónde queda el banco?",en:"Excuse me, where is the bank?"},{id:"d-2",speaker:"them",es:"Está a dos cuadras, por allá.",en:"It's two blocks away, over there."},{id:"d-3",speaker:"you",es:"¿Sigo derecho?",en:"Do I keep going straight?"},{id:"d-4",speaker:"them",es:"Sí, siga derecho y doble a la izquierda.",en:"Yes, go straight and turn left."},{id:"d-5",speaker:"you",es:"¿Está lejos?",en:"Is it far?"},{id:"d-6",speaker:"them",es:"No, está cerca, a la vuelta.",en:"No, it's close, just around the corner."},{id:"d-7",speaker:"you",es:"Muchas gracias.",en:"Thank you very much."}],chunks:[{id:"d-c1",es:"¿Dónde queda…?",en:"Where is…? (located)"},{id:"d-c2",es:"a dos cuadras",en:"two blocks away"},{id:"d-c3",es:"¿Está lejos?",en:"Is it far?"},{id:"d-c4",es:"está cerca",en:"it's close"},{id:"d-c5",es:"doble a la izquierda",en:"turn left"}],vocab:[{id:"d-v1",es:"la cuadra",en:"block",pos:"n."},{id:"d-v2",es:"lejos",en:"far",pos:"adv."},{id:"d-v3",es:"cerca",en:"close / near",pos:"adv."},{id:"d-v4",es:"doblar",en:"to turn",pos:"v."},{id:"d-v5",es:"el banco",en:"bank",pos:"n."},{id:"d-v6",es:"allá",en:"over there",pos:"adv."},{id:"d-v7",es:"la vuelta",en:"the turn / corner",pos:"n."}],grammarNote:`"Quedar" is used for where things are located: "¿Dónde queda el baño?" (where's the bathroom?). Directions you'll hear as polite (usted) commands: "siga" (continue), "doble" (turn), "cruce" (cross). Pair with "a la derecha / a la izquierda" (to the right / left).`,roleplay:[{id:"d-r1",prompt:"¿Le ayudo en algo?",promptEn:"Can I help you with something?",accept:["donde queda el banco","disculpe donde queda el banco","donde queda el banco por favor"],hint:"Ask where the bank is."},{id:"d-r2",prompt:"Está a dos cuadras, por allá.",promptEn:"It's two blocks away, over there.",accept:["esta lejos","sigo derecho","esta lejos sigo derecho"],hint:"Ask if it's far, or if you keep straight."},{id:"d-r3",prompt:"No, está cerca, a la vuelta.",promptEn:"No, it's close, around the corner.",accept:["muchas gracias","gracias","muchas gracias muy amable"],hint:"Thank them."}],shadowing:["d-1","d-3","d-5"]},pf={id:"familia",tier:2,cefr:"A2",title:"Hablar de tu familia",goal:"Talk about your siblings and parents, and say you miss them.",culture:'Family is the center of Ecuadorian life, so these questions come up fast and warmly. "Los papás" means "parents" (not just dads). "Extrañar" is the Latin American verb for "to miss" (Spain uses "echar de menos").',dialogue:[{id:"fa-1",speaker:"them",es:"¿Tienes hermanos?",en:"Do you have siblings?"},{id:"fa-2",speaker:"you",es:"Sí, tengo un hermano y una hermana.",en:"Yes, I have a brother and a sister."},{id:"fa-3",speaker:"them",es:"¿Y son mayores o menores?",en:"And are they older or younger?"},{id:"fa-4",speaker:"you",es:"Mi hermano es mayor y mi hermana es menor.",en:"My brother is older and my sister is younger."},{id:"fa-5",speaker:"them",es:"¿Tus papás viven aquí?",en:"Do your parents live here?"},{id:"fa-6",speaker:"you",es:"No, viven en Estados Unidos. Los extraño mucho.",en:"No, they live in the US. I miss them a lot."},{id:"fa-7",speaker:"them",es:"Claro, la familia siempre hace falta.",en:"Of course, you always miss family."}],chunks:[{id:"fa-c1",es:"¿Tienes hermanos?",en:"Do you have siblings?"},{id:"fa-c2",es:"tengo un hermano",en:"I have a brother"},{id:"fa-c3",es:"mayor o menor",en:"older or younger"},{id:"fa-c4",es:"¿Tus papás viven aquí?",en:"Do your parents live here?"},{id:"fa-c5",es:"Los extraño mucho",en:"I miss them a lot"}],vocab:[{id:"fa-v1",es:"el hermano",en:"brother",pos:"n."},{id:"fa-v2",es:"la hermana",en:"sister",pos:"n."},{id:"fa-v3",es:"los papás",en:"parents",pos:"n."},{id:"fa-v4",es:"mayor",en:"older",pos:"adj."},{id:"fa-v5",es:"menor",en:"younger",pos:"adj."},{id:"fa-v6",es:"vivir",en:"to live",pos:"v."},{id:"fa-v7",es:"extrañar",en:"to miss",pos:"v."}],grammarNote:'"Tener" carries relationships: "tengo dos hermanos", "tengo una hija". For age comparison, Spanish uses "mayor" (older) and "menor" (younger) rather than "más viejo/joven" for people. Object pronouns sit before the verb: "los extraño" (I miss them), "te extraño" (I miss you).',roleplay:[{id:"fa-r1",prompt:"¿Tienes hermanos?",promptEn:"Do you have siblings?",accept:["si tengo un hermano y una hermana","tengo un hermano y una hermana","si tengo dos hermanos"],hint:"Say how many brothers/sisters you have."},{id:"fa-r2",prompt:"¿Tus papás viven aquí?",promptEn:"Do your parents live here?",accept:["no viven en estados unidos los extraño mucho","no viven en estados unidos","no los extraño mucho"],hint:"Say where they live and that you miss them."},{id:"fa-r3",prompt:"Claro, la familia siempre hace falta.",promptEn:"Of course, you always miss family.",accept:["si bastante","asi es","si la verdad"],hint:"Agree warmly."}],shadowing:["fa-2","fa-4","fa-6"]},hf={id:"farmacia",tier:3,cefr:"B1",title:"En la farmacia",goal:"Describe a symptom, ask for something to treat it, and understand the dosage.",culture:`Pharmacies ("farmacias" or "boticas") are everywhere in Ecuador and pharmacists give a lot of informal advice. Many common medicines are available without a prescription ("sin receta"). You'll be asked "¿cada cuánto?" — how often to take it.`,dialogue:[{id:"f-1",speaker:"them",es:"Buenas, ¿en qué le puedo ayudar?",en:"Hello, how can I help you?"},{id:"f-2",speaker:"you",es:"Me duele la cabeza. ¿Tiene algo para el dolor?",en:"I have a headache. Do you have something for the pain?"},{id:"f-3",speaker:"them",es:"Sí, esto le va a ayudar. ¿Tiene receta?",en:"Yes, this will help you. Do you have a prescription?"},{id:"f-4",speaker:"you",es:"No, ¿se puede sin receta?",en:"No, can I get it without a prescription?"},{id:"f-5",speaker:"them",es:"Claro. Tome una pastilla cada ocho horas.",en:"Of course. Take one pill every eight hours."},{id:"f-6",speaker:"you",es:"Entendido. ¿Cuánto le debo?",en:"Understood. How much do I owe you?"},{id:"f-7",speaker:"them",es:"Tres dólares con cincuenta.",en:"Three dollars fifty."}],chunks:[{id:"f-c1",es:"Me duele…",en:"My … hurts / I have a … ache"},{id:"f-c2",es:"¿Tiene algo para…?",en:"Do you have something for…?"},{id:"f-c3",es:"¿Se puede sin receta?",en:"Can I get it without a prescription?"},{id:"f-c4",es:"cada ocho horas",en:"every eight hours"},{id:"f-c5",es:"Entendido",en:"Understood / got it"}],vocab:[{id:"f-v1",es:"la cabeza",en:"head",pos:"n."},{id:"f-v2",es:"el dolor",en:"pain",pos:"n."},{id:"f-v3",es:"la pastilla",en:"pill",pos:"n."},{id:"f-v4",es:"la receta",en:"prescription",pos:"n."},{id:"f-v5",es:"doler",en:"to hurt",pos:"v."},{id:"f-v6",es:"el estómago",en:"stomach",pos:"n."},{id:"f-v7",es:"la garganta",en:"throat",pos:"n."}],grammarNote:'"Doler" works like "gustar": the body part is the subject. "Me duele la cabeza" = "the head hurts to me". Plural body parts take "duelen": "me duelen los pies" (my feet hurt). Swap "me" for "le" to ask about someone else: "¿Le duele algo?"',roleplay:[{id:"f-r1",prompt:"Buenas, ¿en qué le puedo ayudar?",promptEn:"Hello, how can I help you?",accept:["me duele la cabeza tiene algo para el dolor","me duele la cabeza","tiene algo para el dolor de cabeza"],hint:"Say your head hurts and ask for something for the pain."},{id:"f-r2",prompt:"¿Tiene receta?",promptEn:"Do you have a prescription?",accept:["no se puede sin receta","no se puede sin receta","no tiene algo sin receta"],hint:"Say no, and ask if it's available without one."},{id:"f-r3",prompt:"Tome una pastilla cada ocho horas.",promptEn:"Take one pill every eight hours.",accept:["entendido cuanto le debo","entendido","entendido cuanto es"],hint:"Acknowledge and ask the price."}],shadowing:["f-2","f-4","f-6"]},mf={id:"greetings",tier:1,cefr:"A1",title:"Saludos y presentaciones",goal:"Greet someone, introduce yourself, and ask how they are — the Ecuadorian way.",culture:`On the Ecuadorian coast you'll constantly hear "¿Qué más?" as a casual "what's up?". "Buenas" works any time of day. "Chévere" and "bacán" both mean "cool / great".`,dialogue:[{id:"g-1",speaker:"them",es:"¡Buenas! ¿Qué más?",en:"Hi! What's up?",note:"Very common informal greeting in Ecuador."},{id:"g-2",speaker:"you",es:"Todo bien, gracias. ¿Y usted?",en:"All good, thanks. And you?"},{id:"g-3",speaker:"them",es:"Bien también. ¿Cómo te llamas?",en:"Good too. What's your name?"},{id:"g-4",speaker:"you",es:"Me llamo Alex. ¿Y usted?",en:"My name is Alex. And you?"},{id:"g-5",speaker:"them",es:"Yo soy María. Mucho gusto.",en:"I'm María. Nice to meet you."},{id:"g-6",speaker:"you",es:"El gusto es mío.",en:"The pleasure is mine."}],chunks:[{id:"g-c1",es:"¿Qué más?",en:"What's up? / How's it going?"},{id:"g-c2",es:"Todo bien, gracias",en:"All good, thanks"},{id:"g-c3",es:"¿Cómo te llamas?",en:"What's your name?",literal:"how yourself you-call"},{id:"g-c4",es:"Me llamo…",en:"My name is…",literal:"myself I-call"},{id:"g-c5",es:"Mucho gusto",en:"Nice to meet you"},{id:"g-c6",es:"El gusto es mío",en:"The pleasure is mine"}],vocab:[{id:"g-v1",es:"buenas",en:"hello (any time)",pos:"interj."},{id:"g-v2",es:"bien",en:"well / fine",pos:"adv."},{id:"g-v3",es:"gracias",en:"thank you",pos:"interj."},{id:"g-v4",es:"usted",en:"you (formal)",pos:"pron."},{id:"g-v5",es:"también",en:"too / also",pos:"adv."},{id:"g-v6",es:"chévere",en:"cool / great",pos:"adj."},{id:"g-v7",es:"gusto",en:"pleasure",pos:"n."}],grammarNote:'Ecuadorians often default to "usted" even with peers as a sign of warmth and respect, especially in the highlands (sierra). "tú" is also fine and common on the coast. When unsure, "usted" is the safe choice.',roleplay:[{id:"g-r1",prompt:"¡Buenas! ¿Qué más?",promptEn:"Hi! What's up?",accept:["todo bien gracias","todo bien gracias y usted","bien gracias","todo bien y usted"],hint:"Say you're all good and thank them."},{id:"g-r2",prompt:"¿Cómo te llamas?",promptEn:"What's your name?",accept:["me llamo alex","me llamo alex y usted","yo me llamo alex"],hint:'Use "Me llamo…" + your name.'},{id:"g-r3",prompt:"Yo soy María. Mucho gusto.",promptEn:"I'm María. Nice to meet you.",accept:["el gusto es mio","mucho gusto","igualmente"],hint:'Return the pleasure: "El gusto es mío."'}],shadowing:["g-1","g-2","g-3","g-5","g-6"]},gf={id:"historia",tier:4,cefr:"B1+",title:"Ponerse al día",goal:"Catch up on news and react to a story the way people really do.",culture:'Family conversations live on storytelling. Reactions matter as much as the story — "¿en serio?", "¡no lo puedo creer!" keep the other person going. "Resulta que…" is how you launch into news.',dialogue:[{id:"hi-1",speaker:"them",es:"¿Sabes qué pasó la semana pasada?",en:"Do you know what happened last week?"},{id:"hi-2",speaker:"you",es:"No, cuéntame. ¿Qué pasó?",en:"No, tell me. What happened?"},{id:"hi-3",speaker:"them",es:"Resulta que mi hermano se casó.",en:"It turns out my brother got married."},{id:"hi-4",speaker:"you",es:"¿En serio? ¡No lo puedo creer!",en:"Really? I can't believe it!"},{id:"hi-5",speaker:"them",es:"Sí, y al final hicieron una fiesta enorme.",en:"Yes, and in the end they threw a huge party."},{id:"hi-6",speaker:"you",es:"¡Qué increíble! Me hubiera encantado estar ahí.",en:"How incredible! I would have loved to be there."}],chunks:[{id:"hi-c1",es:"¿Sabes qué pasó?",en:"Do you know what happened?"},{id:"hi-c2",es:"Cuéntame",en:"Tell me"},{id:"hi-c3",es:"Resulta que…",en:"It turns out that…"},{id:"hi-c4",es:"¿En serio?",en:"Really? / Seriously?"},{id:"hi-c5",es:"No lo puedo creer",en:"I can't believe it"}],vocab:[{id:"hi-v1",es:"pasar",en:"to happen",pos:"v."},{id:"hi-v2",es:"contar",en:"to tell",pos:"v."},{id:"hi-v3",es:"resultar",en:"to turn out",pos:"v."},{id:"hi-v4",es:"casarse",en:"to get married",pos:"v."},{id:"hi-v5",es:"al final",en:"in the end",pos:"phrase"},{id:"hi-v6",es:"increíble",en:"incredible",pos:"adj."},{id:"hi-v7",es:"la fiesta",en:"party",pos:"n."}],grammarNote:'Story connectors carry a narrative: "resulta que" (it turns out), "entonces" (so/then), "al final" (in the end). Quick reactions keep it alive: "¿en serio?", "¡qué bueno!", "¡no me digas!". "Me hubiera encantado" (I would have loved) is worth learning whole.',roleplay:[{id:"hi-r1",prompt:"¿Sabes qué pasó la semana pasada?",promptEn:"Do you know what happened last week?",accept:["no cuentame que paso","no cuentame","cuentame que paso"],hint:"Say no and ask them to tell you."},{id:"hi-r2",prompt:"Resulta que mi hermano se casó.",promptEn:"It turns out my brother got married.",accept:["en serio no lo puedo creer","en serio","no lo puedo creer"],hint:"React with surprise."},{id:"hi-r3",prompt:"Al final hicieron una fiesta enorme.",promptEn:"In the end they threw a huge party.",accept:["que increible me hubiera encantado estar ahi","que increible","me hubiera encantado estar ahi"],hint:"Say how incredible, and that you'd have loved to be there."}],shadowing:["hi-1","hi-3","hi-5","hi-6"]},vf={id:"hotel",tier:3,cefr:"B1",title:"En el hospedaje",goal:"Check in: confirm your booking, choose a room, and ask the essentials.",culture:'Budget lodging in Ecuador is often a "hostal" or "hospedaje". "La clave" almost always means the wifi password. Breakfast ("el desayuno") is frequently included.',dialogue:[{id:"h-1",speaker:"them",es:"Buenas, ¿tiene reservación?",en:"Hello, do you have a reservation?"},{id:"h-2",speaker:"you",es:"Sí, a nombre de Alex. Una habitación para dos noches.",en:"Yes, under the name Alex. A room for two nights."},{id:"h-3",speaker:"them",es:"Perfecto. ¿Habitación simple o doble?",en:"Perfect. Single or double room?"},{id:"h-4",speaker:"you",es:"Simple, por favor. ¿Tiene wifi?",en:"Single, please. Do you have wifi?"},{id:"h-5",speaker:"them",es:"Sí, la clave está en la tarjeta. El desayuno es a las siete.",en:"Yes, the password is on the card. Breakfast is at seven."},{id:"h-6",speaker:"you",es:"¿A qué hora es el check out?",en:"What time is check-out?"},{id:"h-7",speaker:"them",es:"A mediodía. Que descanse.",en:"At noon. Rest well."}],chunks:[{id:"h-c1",es:"¿Tiene reservación?",en:"Do you have a reservation?"},{id:"h-c2",es:"a nombre de…",en:"under the name of…"},{id:"h-c3",es:"para dos noches",en:"for two nights"},{id:"h-c4",es:"¿Tiene wifi?",en:"Do you have wifi?"},{id:"h-c5",es:"Que descanse",en:"Rest well (polite)"}],vocab:[{id:"h-v1",es:"la habitación",en:"room",pos:"n."},{id:"h-v2",es:"la reservación",en:"reservation",pos:"n."},{id:"h-v3",es:"la noche",en:"night",pos:"n."},{id:"h-v4",es:"la clave",en:"password",pos:"n."},{id:"h-v5",es:"el desayuno",en:"breakfast",pos:"n."},{id:"h-v6",es:"mediodía",en:"noon",pos:"n."},{id:"h-v7",es:"doble",en:"double",pos:"adj."}],grammarNote:`"Para" expresses duration/purpose here: "para dos noches" (for two nights). "Que descanse" / "que le vaya bien" are polite well-wishes using the subjunctive — learn them as fixed phrases; you don't need the grammar behind them yet.`,roleplay:[{id:"h-r1",prompt:"Buenas, ¿tiene reservación?",promptEn:"Hello, do you have a reservation?",accept:["si a nombre de alex","si a nombre de alex una habitacion para dos noches","a nombre de alex"],hint:"Confirm, give the name, mention two nights."},{id:"h-r2",prompt:"¿Habitación simple o doble?",promptEn:"Single or double room?",accept:["simple por favor tiene wifi","simple por favor","una simple tiene wifi"],hint:"Choose single and ask about wifi."},{id:"h-r3",prompt:"El desayuno es a las siete.",promptEn:"Breakfast is at seven.",accept:["a que hora es el check out","perfecto a que hora es el check out","gracias a que hora es el checkout"],hint:"Ask what time check-out is."}],shadowing:["h-2","h-4","h-6"]},yf={id:"llamada",tier:2,cefr:"A2",title:"Una llamada a la abuela",goal:"Have a short, warm phone call with a grandparent.",culture:'Ecuadorians answer the phone with "¿Aló?". Grandparents are usually addressed with "usted" out of respect and affection. Calls end with hugs and blessings, not a quick "bye".',dialogue:[{id:"ll-1",speaker:"them",es:"¿Aló? ¿Cómo estás, mijo?",en:"Hello? How are you, dear?"},{id:"ll-2",speaker:"you",es:"Hola, abuela. Todo bien, ¿y usted cómo está?",en:"Hi, grandma. All good, and how are you?"},{id:"ll-3",speaker:"them",es:"Aquí, extrañándote. ¿Cuándo vienes a visitarnos?",en:"Here, missing you. When are you coming to visit us?"},{id:"ll-4",speaker:"you",es:"Pronto, abuela. La llamo la próxima semana.",en:"Soon, grandma. I'll call you next week."},{id:"ll-5",speaker:"them",es:"Cuídate mucho. Te mando un abrazo.",en:"Take good care. I send you a hug."},{id:"ll-6",speaker:"you",es:"Yo también la quiero. Chao, abuela.",en:"I love you too. Bye, grandma."}],chunks:[{id:"ll-c1",es:"¿Aló?",en:"Hello? (on the phone)"},{id:"ll-c2",es:"¿Cuándo vienes a visitarnos?",en:"When are you coming to visit us?"},{id:"ll-c3",es:"La llamo la próxima semana",en:"I'll call you next week (formal)"},{id:"ll-c4",es:"Te mando un abrazo",en:"I send you a hug"},{id:"ll-c5",es:"Yo también la quiero",en:"I love you too (formal)"}],vocab:[{id:"ll-v1",es:"la abuela",en:"grandmother",pos:"n."},{id:"ll-v2",es:"el abuelo",en:"grandfather",pos:"n."},{id:"ll-v3",es:"visitar",en:"to visit",pos:"v."},{id:"ll-v4",es:"pronto",en:"soon",pos:"adv."},{id:"ll-v5",es:"el abrazo",en:"hug",pos:"n."},{id:"ll-v6",es:"cuidarse",en:"to take care",pos:"v."},{id:"ll-v7",es:"la semana",en:"week",pos:"n."}],grammarNote:'"Querer" means "to love" with people: "te quiero" (informal) / "la quiero" (formal, to your grandma). "Venir a + infinitive" = "to come to do something". With grandparents, keep "usted": "¿cómo está usted?", "la llamo", "cuídese".',roleplay:[{id:"ll-r1",prompt:"¿Aló? ¿Cómo estás, mijo?",promptEn:"Hello? How are you, dear?",accept:["hola abuela todo bien y usted como esta","hola abuela todo bien","todo bien abuela y usted"],hint:"Greet grandma, say you're good, ask how she is (usted)."},{id:"ll-r2",prompt:"¿Cuándo vienes a visitarnos?",promptEn:"When are you coming to visit us?",accept:["pronto abuela la llamo la proxima semana","pronto abuela","pronto la llamo la proxima semana"],hint:`Say "soon" and that you'll call next week.`},{id:"ll-r3",prompt:"Cuídate mucho. Te mando un abrazo.",promptEn:"Take care. I send you a hug.",accept:["yo tambien la quiero chao abuela","yo tambien la quiero","la quiero mucho chao abuela"],hint:"Say you love her too and say bye."}],shadowing:["ll-2","ll-4","ll-6"]},bf={id:"mercado",tier:1,cefr:"A1",title:"En el mercado",goal:"Ask prices, handle numbers and dollars, and buy fruit at the market.",culture:'Ecuador uses the US dollar, so prices are familiar. At markets you buy by "la libra" (pound) and you can gently bargain. A bag is "una funda". "¿A cómo está…?" means "how much is…?".',dialogue:[{id:"m-1",speaker:"you",es:"Buenas, ¿a cómo está la libra de tomate?",en:"Hello, how much is a pound of tomatoes?"},{id:"m-2",speaker:"them",es:"A un dólar la libra, casero.",en:"A dollar a pound, my friend.",note:'"casero/a" = regular customer; a friendly market address.'},{id:"m-3",speaker:"you",es:"¿Me da dos libras? Y una funda, por favor.",en:"Can you give me two pounds? And a bag, please."},{id:"m-4",speaker:"them",es:"Claro. Son dos dólares.",en:"Sure. That's two dollars."},{id:"m-5",speaker:"you",es:"¿No me hace una rebajita?",en:"Won't you give me a little discount?"},{id:"m-6",speaker:"them",es:"Le dejo en uno cincuenta. ¿Le doy algo más?",en:"I'll let you have it for one fifty. Anything else?"},{id:"m-7",speaker:"you",es:"No, gracias. Aquí tiene.",en:"No, thanks. Here you go."}],chunks:[{id:"m-c1",es:"¿A cómo está…?",en:"How much is…? (per unit)"},{id:"m-c2",es:"¿Me da…?",en:"Can you give me…?"},{id:"m-c3",es:"una funda",en:"a bag"},{id:"m-c4",es:"¿No me hace una rebajita?",en:"Won't you give me a little discount?"},{id:"m-c5",es:"Aquí tiene",en:"Here you go"}],vocab:[{id:"m-v1",es:"la libra",en:"pound (weight)",pos:"n."},{id:"m-v2",es:"el dólar",en:"dollar",pos:"n."},{id:"m-v3",es:"el tomate",en:"tomato",pos:"n."},{id:"m-v4",es:"la funda",en:"bag",pos:"n."},{id:"m-v5",es:"uno",en:"one",pos:"num."},{id:"m-v6",es:"dos",en:"two",pos:"num."},{id:"m-v7",es:"cincuenta",en:"fifty",pos:"num."},{id:"m-v8",es:"la rebaja",en:"discount",pos:"n."}],grammarNote:'Prices are read as plain numbers: "uno cincuenta" = $1.50, "dos veinticinco" = $2.25. The "-ita" ending in "rebajita" is a diminutive that softens the request and is extremely common in Ecuadorian speech ("un ratito", "ahorita").',roleplay:[{id:"m-r1",prompt:"¿Qué le doy, casero?",promptEn:"What can I get you, friend?",accept:["a como esta la libra de tomate","me da dos libras de tomate","a como esta el tomate"],hint:"Ask the price per pound, or ask for two pounds."},{id:"m-r2",prompt:"Son dos dólares.",promptEn:"That's two dollars.",accept:["no me hace una rebajita","me hace una rebajita","no me rebaja"],hint:"Politely ask for a little discount."},{id:"m-r3",prompt:"Le dejo en uno cincuenta. ¿Le doy algo más?",promptEn:"I'll let you have it for one fifty. Anything else?",accept:["no gracias aqui tiene","no gracias","nada mas gracias aqui tiene"],hint:"Decline and hand over the money."}],shadowing:["m-1","m-3","m-5"]},_f={id:"numeros",tier:1,cefr:"A1",title:"Números y la hora",goal:"Ask the time and a price, and understand numbers — at a bus station.",culture:'Intercity buses are how most Ecuadorians travel. The ticket is "el pasaje". Times are usually given on the hour with "y media" (half past) or "y cuarto" (quarter past).',dialogue:[{id:"n-1",speaker:"you",es:"Disculpe, ¿a qué hora sale el bus a Quito?",en:"Excuse me, what time does the bus to Quito leave?"},{id:"n-2",speaker:"them",es:"Sale a las nueve y media.",en:"It leaves at nine thirty."},{id:"n-3",speaker:"you",es:"¿Y cuánto cuesta el pasaje?",en:"And how much is the ticket?"},{id:"n-4",speaker:"them",es:"Ocho dólares.",en:"Eight dollars."},{id:"n-5",speaker:"you",es:"¿Cuántas horas son de viaje?",en:"How many hours is the trip?"},{id:"n-6",speaker:"them",es:"Como cinco horas.",en:"About five hours."},{id:"n-7",speaker:"you",es:"Perfecto, deme un pasaje.",en:"Perfect, give me one ticket."}],chunks:[{id:"n-c1",es:"¿A qué hora sale…?",en:"What time does … leave?"},{id:"n-c2",es:"¿Cuánto cuesta…?",en:"How much is…?"},{id:"n-c3",es:"¿Cuántas horas…?",en:"How many hours…?"},{id:"n-c4",es:"y media",en:"half past"},{id:"n-c5",es:"como cinco horas",en:"about five hours"}],vocab:[{id:"n-v1",es:"el bus",en:"bus",pos:"n."},{id:"n-v2",es:"el pasaje",en:"fare / ticket",pos:"n."},{id:"n-v3",es:"el viaje",en:"trip",pos:"n."},{id:"n-v4",es:"salir",en:"to leave / depart",pos:"v."},{id:"n-v5",es:"costar",en:"to cost",pos:"v."},{id:"n-v6",es:"nueve",en:"nine",pos:"num."},{id:"n-v7",es:"cinco",en:"five",pos:"num."},{id:"n-v8",es:"ocho",en:"eight",pos:"num."}],grammarNote:'Telling time: "a las" + hour, then "y media" (:30), "y cuarto" (:15), or "menos cuarto" (:45). "Como" before a number means "about / roughly": "como cinco horas", "como diez dólares". Useful numbers: uno, dos, tres, cuatro, cinco, seis, siete, ocho, nueve, diez.',roleplay:[{id:"n-r1",prompt:"¿A dónde va?",promptEn:"Where are you going?",accept:["a que hora sale el bus a quito","a quito a que hora sale","voy a quito a que hora sale el bus"],hint:"Ask what time the bus to Quito leaves."},{id:"n-r2",prompt:"Sale a las nueve y media.",promptEn:"It leaves at nine thirty.",accept:["cuanto cuesta el pasaje","y cuanto cuesta el pasaje","cuanto cuesta"],hint:"Ask how much the ticket costs."},{id:"n-r3",prompt:"Ocho dólares.",promptEn:"Eight dollars.",accept:["perfecto deme un pasaje","deme un pasaje","deme un pasaje por favor"],hint:"Ask for one ticket."}],shadowing:["n-1","n-3","n-5"]},wf={id:"opinion",tier:4,cefr:"B1",title:"Dar tu opinión",goal:"Give an opinion, agree, and disagree warmly — without being abrupt.",culture:'Ecuadorians soften disagreement; you rarely flatly contradict someone. "Te entiendo, pero…" and "cada quien con su gusto" let you differ while keeping things warm.',dialogue:[{id:"op-1",speaker:"them",es:"¿Qué piensas de la comida ecuatoriana?",en:"What do you think of Ecuadorian food?"},{id:"op-2",speaker:"you",es:"Creo que es deliciosa, sobre todo el ceviche.",en:"I think it's delicious, especially the ceviche."},{id:"op-3",speaker:"them",es:"¿Verdad que sí? ¿Y qué tal el clima?",en:"Right? And how about the weather?"},{id:"op-4",speaker:"you",es:"La verdad, prefiero el clima de la costa.",en:"Honestly, I prefer the coast's weather."},{id:"op-5",speaker:"them",es:"Te entiendo, pero a mí me gusta más la sierra.",en:"I get you, but I like the highlands more."},{id:"op-6",speaker:"you",es:"Cada quien con su gusto, ¿no?",en:"To each their own, right?"}],chunks:[{id:"op-c1",es:"¿Qué piensas de…?",en:"What do you think of…?"},{id:"op-c2",es:"Creo que…",en:"I think that…"},{id:"op-c3",es:"La verdad…",en:"Honestly… / The truth is…"},{id:"op-c4",es:"Te entiendo, pero…",en:"I get you, but…"},{id:"op-c5",es:"Cada quien con su gusto",en:"To each their own"}],vocab:[{id:"op-v1",es:"pensar",en:"to think",pos:"v."},{id:"op-v2",es:"creer",en:"to believe / think",pos:"v."},{id:"op-v3",es:"preferir",en:"to prefer",pos:"v."},{id:"op-v4",es:"sobre todo",en:"especially",pos:"phrase"},{id:"op-v5",es:"entender",en:"to understand",pos:"v."},{id:"op-v6",es:"el gusto",en:"taste / preference",pos:"n."},{id:"op-v7",es:"la costa",en:"the coast",pos:"n."}],grammarNote:'Opinions use "creo que / pienso que" + normal (indicative) verb: "creo que es buena". "Preferir" changes its stem: prefiero, prefieres, prefiere. To disagree kindly, lead with agreement: "te entiendo, pero…" or "puede ser, pero yo…".',roleplay:[{id:"op-r1",prompt:"¿Qué piensas de la comida ecuatoriana?",promptEn:"What do you think of Ecuadorian food?",accept:["creo que es deliciosa sobre todo el ceviche","creo que es deliciosa","pienso que es deliciosa"],hint:"Say you think it's delicious (and name a favorite)."},{id:"op-r2",prompt:"¿Y qué tal el clima?",promptEn:"And how about the weather?",accept:["la verdad prefiero el clima de la costa","prefiero el clima de la costa","la verdad prefiero la costa"],hint:"Give your honest preference."},{id:"op-r3",prompt:"A mí me gusta más la sierra.",promptEn:"I like the highlands more.",accept:["cada quien con su gusto","cada quien con su gusto no","te entiendo cada quien con su gusto"],hint:'Close it warmly: "to each their own".'}],shadowing:["op-1","op-2","op-4"]},xf={id:"pasado",tier:4,cefr:"B1+",title:"Contar lo que hiciste",goal:"Tell someone about your day or trip in the past tense.",culture:`Otavalo, north of Quito, has one of South America's most famous indigenous markets. "Llapingachos" are beloved Ecuadorian potato patties — a great thing to have tried and to talk about.`,dialogue:[{id:"x-1",speaker:"them",es:"¿Qué hiciste ayer?",en:"What did you do yesterday?"},{id:"x-2",speaker:"you",es:"Fui a Otavalo y visité el mercado.",en:"I went to Otavalo and visited the market."},{id:"x-3",speaker:"them",es:"¡Qué bueno! ¿Y te gustó?",en:"How nice! And did you like it?"},{id:"x-4",speaker:"you",es:"Me encantó. Compré un poncho y comí muy rico.",en:"I loved it. I bought a poncho and ate really well."},{id:"x-5",speaker:"them",es:"¿Qué comiste?",en:"What did you eat?"},{id:"x-6",speaker:"you",es:"Comí llapingachos. Estuvieron deliciosos.",en:"I ate llapingachos. They were delicious."}],chunks:[{id:"x-c1",es:"¿Qué hiciste ayer?",en:"What did you do yesterday?"},{id:"x-c2",es:"Fui a…",en:"I went to…"},{id:"x-c3",es:"Me encantó",en:"I loved it"},{id:"x-c4",es:"Compré…",en:"I bought…"},{id:"x-c5",es:"¿Qué comiste?",en:"What did you eat?"}],vocab:[{id:"x-v1",es:"ayer",en:"yesterday",pos:"adv."},{id:"x-v2",es:"fui",en:"I went / I was",pos:"v."},{id:"x-v3",es:"visité",en:"I visited",pos:"v."},{id:"x-v4",es:"compré",en:"I bought",pos:"v."},{id:"x-v5",es:"comí",en:"I ate",pos:"v."},{id:"x-v6",es:"rico",en:"tasty / delicious",pos:"adj."},{id:"x-v7",es:"el mercado",en:"market",pos:"n."}],grammarNote:'This is the preterite (completed past). Regular "-ar" verbs end in -é/-aste (compré, compraste); "-er/-ir" in -í/-iste (comí, comiste). Two essentials are irregular and identical: ser and ir both become "fui" (I was / I went) — context tells them apart. "Hacer" → "hice / hiciste".',roleplay:[{id:"x-r1",prompt:"¿Qué hiciste ayer?",promptEn:"What did you do yesterday?",accept:["fui a otavalo y visite el mercado","fui a otavalo","fui al mercado de otavalo"],hint:"Say you went to Otavalo and visited the market."},{id:"x-r2",prompt:"¿Y te gustó?",promptEn:"And did you like it?",accept:["me encanto compre un poncho","me encanto","si me encanto"],hint:"Say you loved it (and maybe what you bought)."},{id:"x-r3",prompt:"¿Qué comiste?",promptEn:"What did you eat?",accept:["comi llapingachos","comi llapingachos estuvieron deliciosos","comi llapingachos muy ricos"],hint:"Say you ate llapingachos."}],shadowing:["x-1","x-2","x-4","x-6"]},kf={id:"planes",tier:2,cefr:"A2",title:"Hacer planes",goal:"Invite someone out, agree on a time, and confirm the plan.",culture:'Ecuadorians often say "el finde" for the weekend and "dale" as a casual "okay/sounds good". "Nos vemos" ("see you") is the standard sign-off. Time is given on the hour with "a las…".',dialogue:[{id:"p-1",speaker:"them",es:"¿Qué haces el finde?",en:"What are you doing this weekend?"},{id:"p-2",speaker:"you",es:"Nada todavía. ¿Por qué?",en:"Nothing yet. Why?"},{id:"p-3",speaker:"them",es:"¿Quieres ir a tomar un café?",en:"Do you want to go get a coffee?"},{id:"p-4",speaker:"you",es:"¡Dale! ¿A qué hora?",en:"Sounds good! What time?"},{id:"p-5",speaker:"them",es:"El sábado a las cuatro, ¿te parece?",en:"Saturday at four, does that work for you?"},{id:"p-6",speaker:"you",es:"Perfecto. Nos vemos el sábado.",en:"Perfect. See you Saturday."}],chunks:[{id:"p-c1",es:"¿Qué haces el finde?",en:"What are you doing this weekend?"},{id:"p-c2",es:"¿Quieres ir a…?",en:"Do you want to go…?"},{id:"p-c3",es:"¿A qué hora?",en:"What time?"},{id:"p-c4",es:"¿Te parece?",en:"Does that work for you? / Sound good?"},{id:"p-c5",es:"Nos vemos",en:"See you"}],vocab:[{id:"p-v1",es:"el finde",en:"the weekend (casual)",pos:"n."},{id:"p-v2",es:"dale",en:"okay / go for it",pos:"interj."},{id:"p-v3",es:"el sábado",en:"Saturday",pos:"n."},{id:"p-v4",es:"la hora",en:"time / hour",pos:"n."},{id:"p-v5",es:"querer",en:"to want",pos:"v."},{id:"p-v6",es:"perfecto",en:"perfect",pos:"adj."},{id:"p-v7",es:"todavía",en:"yet / still",pos:"adv."}],grammarNote:`Telling time uses "a las" + number for the hour: "a las cuatro" (at four), "a las ocho y media" (at 8:30). The only exception is one o'clock: "a la una". "¿Quieres…?" + an infinitive is the everyday way to invite: "¿Quieres comer?", "¿Quieres salir?"`,roleplay:[{id:"p-r1",prompt:"¿Qué haces el finde?",promptEn:"What are you doing this weekend?",accept:["nada todavia por que","nada todavia","nada por que"],hint:'Say "nothing yet" and ask why.'},{id:"p-r2",prompt:"¿Quieres ir a tomar un café?",promptEn:"Do you want to go get a coffee?",accept:["dale a que hora","si dale a que hora","claro a que hora"],hint:"Accept enthusiastically and ask the time."},{id:"p-r3",prompt:"El sábado a las cuatro, ¿te parece?",promptEn:"Saturday at four, does that work?",accept:["perfecto nos vemos el sabado","perfecto nos vemos","dale nos vemos el sabado"],hint:'Confirm and say "see you Saturday".'}],shadowing:["p-1","p-3","p-4","p-6"]},Ef={id:"presentar",tier:2,cefr:"A2",title:"Conocer a la familia",goal:"Be introduced to a relative and respond warmly when welcomed.",culture:`Meeting family in Ecuador is warm and immediate — you'll likely be offered food within a minute. "Mijo / mija" (from "mi hijo/hija") is an affectionate way elders address younger people, even if you're not their child.`,dialogue:[{id:"pr-1",speaker:"them",es:"Te presento a mi mamá.",en:"Let me introduce you to my mom."},{id:"pr-2",speaker:"you",es:"Mucho gusto, señora. Encantado de conocerla.",en:"Nice to meet you, ma'am. Pleased to meet you."},{id:"pr-3",speaker:"them",es:"El gusto es mío, mijo. Bienvenido.",en:"The pleasure is mine, dear. Welcome."},{id:"pr-4",speaker:"you",es:"Gracias por recibirme.",en:"Thank you for having me."},{id:"pr-5",speaker:"them",es:"Pasa, pasa. ¿Tienes hambre?",en:"Come in, come in. Are you hungry?"},{id:"pr-6",speaker:"you",es:"Un poquito, la verdad.",en:"A little, honestly."}],chunks:[{id:"pr-c1",es:"Te presento a…",en:"Let me introduce you to…"},{id:"pr-c2",es:"Encantado de conocerla",en:"Pleased to meet you (formal)"},{id:"pr-c3",es:"Gracias por recibirme",en:"Thank you for having me"},{id:"pr-c4",es:"Pasa, pasa",en:"Come in, come in"},{id:"pr-c5",es:"un poquito, la verdad",en:"a little, honestly"}],vocab:[{id:"pr-v1",es:"presentar",en:"to introduce",pos:"v."},{id:"pr-v2",es:"la mamá",en:"mom",pos:"n."},{id:"pr-v3",es:"mijo / mija",en:"dear (affectionate)",pos:"n."},{id:"pr-v4",es:"recibir",en:"to receive / host",pos:"v."},{id:"pr-v5",es:"el hambre",en:"hunger",pos:"n."},{id:"pr-v6",es:"encantado",en:"delighted",pos:"adj."},{id:"pr-v7",es:"bienvenido",en:"welcome",pos:"adj."}],grammarNote:`Say "encantado" if you're male, "encantada" if female — adjectives agree with you, the speaker. "Conocer" (to meet/know a person) takes pronoun endings: "conocerla" (to meet you-formal-fem), "conocerte" (to meet you-informal). "Gracias por + infinitive" = "thanks for —ing".`,roleplay:[{id:"pr-r1",prompt:"Te presento a mi mamá.",promptEn:"Let me introduce you to my mom.",accept:["mucho gusto señora encantado de conocerla","mucho gusto señora","encantado de conocerla"],hint:"Greet her politely and say you're pleased to meet her."},{id:"pr-r2",prompt:"El gusto es mío, mijo. Bienvenido.",promptEn:"The pleasure is mine, dear. Welcome.",accept:["gracias por recibirme","muchas gracias por recibirme","gracias por recibirme señora"],hint:"Thank her for having you."},{id:"pr-r3",prompt:"Pasa, pasa. ¿Tienes hambre?",promptEn:"Come in. Are you hungry?",accept:["un poquito la verdad","un poquito","si un poco"],hint:"Admit you're a little hungry."}],shadowing:["pr-1","pr-2","pr-4"]},Sf={id:"sobremesa",tier:3,cefr:"B1",title:"La sobremesa",goal:"Compliment the cook and decline seconds politely after a family meal.",culture:'The "sobremesa" — staying at the table talking long after the food is gone — is sacred family time in Ecuador. Praising the cook ("estuvo riquísimo") and thanking them warmly matters a lot.',dialogue:[{id:"so-1",speaker:"them",es:"¿Quieres más? Hay bastante.",en:"Do you want more? There's plenty."},{id:"so-2",speaker:"you",es:"No, gracias, quedé lleno. Estuvo riquísimo.",en:"No thanks, I'm full. It was delicious."},{id:"so-3",speaker:"them",es:"Me alegra que te haya gustado.",en:"I'm glad you liked it."},{id:"so-4",speaker:"you",es:"¿Usted cocinó todo esto?",en:"Did you cook all of this?"},{id:"so-5",speaker:"them",es:"Sí, con mucho cariño.",en:"Yes, with a lot of love."},{id:"so-6",speaker:"you",es:"Se nota. Muchas gracias por todo.",en:"You can tell. Thank you so much for everything."}],chunks:[{id:"so-c1",es:"¿Quieres más?",en:"Do you want more?"},{id:"so-c2",es:"quedé lleno",en:"I'm full"},{id:"so-c3",es:"Estuvo riquísimo",en:"It was delicious"},{id:"so-c4",es:"con mucho cariño",en:"with a lot of love"},{id:"so-c5",es:"Gracias por todo",en:"Thanks for everything"}],vocab:[{id:"so-v1",es:"lleno",en:"full",pos:"adj."},{id:"so-v2",es:"cocinar",en:"to cook",pos:"v."},{id:"so-v3",es:"el cariño",en:"affection / love",pos:"n."},{id:"so-v4",es:"riquísimo",en:"super tasty",pos:"adj."},{id:"so-v5",es:"bastante",en:"plenty / quite a lot",pos:"adv."},{id:"so-v6",es:"notar",en:"to notice / tell",pos:"v."},{id:"so-v7",es:"la comida",en:"food / meal",pos:"n."}],grammarNote:'Add "-ísimo/-ísima" to an adjective for "very / super": rico → riquísimo, bueno → buenísimo, lindo → lindísimo. "Quedé lleno" uses the preterite of "quedar" for a resulting state ("I ended up full"). "Me alegra que…" is a warm fixed phrase — learn it whole.',roleplay:[{id:"so-r1",prompt:"¿Quieres más? Hay bastante.",promptEn:"Do you want more? There's plenty.",accept:["no gracias quede lleno estuvo riquisimo","no gracias quede lleno","no gracias estuvo riquisimo"],hint:"Decline, say you're full, and praise the food."},{id:"so-r2",prompt:"Me alegra que te haya gustado.",promptEn:"I'm glad you liked it.",accept:["usted cocino todo esto","cocino todo esto usted","usted preparo todo esto"],hint:"Ask if they cooked all of it."},{id:"so-r3",prompt:"Sí, con mucho cariño.",promptEn:"Yes, with a lot of love.",accept:["se nota muchas gracias por todo","muchas gracias por todo","se nota gracias por todo"],hint:"Say you can tell, and thank them for everything."}],shadowing:["so-2","so-4","so-6"]},Cf={id:"taxi",tier:1,cefr:"A1",title:"Tomar un taxi",goal:"Take a taxi: give a destination, agree a fare, and direct the driver.",culture:`In many Ecuadorian cities taxis should use the meter ("taxímetro"), but it's normal to confirm the fare first: "¿Cuánto me cobra a…?". "Siga derecho" means "go straight" (not "right" — that's "a la derecha").`,dialogue:[{id:"t-1",speaker:"you",es:
