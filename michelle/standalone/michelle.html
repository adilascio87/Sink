 */const Qf=St("XIcon",[["path",{d:"M18 6 6 18",key:"1bl5f8"}],["path",{d:"m6 6 12 12",key:"d8bk6v"}]]),Jf={id:"almuerzo",tier:1,cefr:"A1",title:"El almuerzo",goal:"Order the set lunch (almuerzo) — the everyday Ecuadorian meal — and ask what's included.",culture:'The "almuerzo" is a fixed-price set lunch found everywhere in Ecuador (often $2.50–$4). It usually includes a soup (sopa), a main (segundo) with rice, and a fresh juice (jugo). Just ask "¿Qué hay de almuerzo?"',dialogue:[{id:"a-1",speaker:"them",es:"Buenas, ¿qué va a servirse?",en:"Hello, what will you have?",note:'"servirse" is a polite Ecuadorian way to say "to eat/have".'},{id:"a-2",speaker:"you",es:"¿Qué hay de almuerzo?",en:"What's for lunch (today)?"},{id:"a-3",speaker:"them",es:"Hay sopa de pollo y segundo de carne con arroz.",en:"There's chicken soup and a beef main with rice."},{id:"a-4",speaker:"you",es:"Deme un almuerzo, por favor. ¿Con qué viene el jugo?",en:"Give me one set lunch, please. What's the juice?"},{id:"a-5",speaker:"them",es:"El jugo es de mora. ¿Algo más?",en:"The juice is blackberry. Anything else?"},{id:"a-6",speaker:"you",es:"Nada más, gracias. ¿Cuánto es?",en:"Nothing else, thanks. How much is it?"},{id:"a-7",speaker:"them",es:"Son tres dólares.",en:"It's three dollars."}],chunks:[{id:"a-c1",es:"¿Qué hay de almuerzo?",en:"What's for lunch (today)?"},{id:"a-c2",es:"Deme un almuerzo, por favor",en:"Give me one set lunch, please"},{id:"a-c3",es:"¿Algo más?",en:"Anything else?"},{id:"a-c4",es:"Nada más, gracias",en:"Nothing else, thanks"},{id:"a-c5",es:"¿Cuánto es?",en:"How much is it?"}],vocab:[{id:"a-v1",es:"el almuerzo",en:"set lunch",pos:"n."},{id:"a-v2",es:"la sopa",en:"soup",pos:"n."},{id:"a-v3",es:"el segundo",en:"main course",pos:"n."},{id:"a-v4",es:"el arroz",en:"rice",pos:"n."},{id:"a-v5",es:"el jugo",en:"juice",pos:"n."},{id:"a-v6",es:"la carne",en:"meat / beef",pos:"n."},{id:"a-v7",es:"el pollo",en:"chicken",pos:"n."},{id:"a-v8",es:"por favor",en:"please",pos:"phrase"}],grammarNote:`"Deme" is the polite (usted) command of "dar" (to give) — "give me". It's the workhorse for ordering: "Deme un café", "Deme dos panes". The informal (tú) version is "Dame".`,roleplay:[{id:"a-r1",prompt:"Buenas, ¿qué va a servirse?",promptEn:"Hello, what will you have?",accept:["que hay de almuerzo","deme un almuerzo por favor","un almuerzo por favor"],hint:"Ask what's for lunch, or just order an almuerzo."},{id:"a-r2",prompt:"El jugo es de mora. ¿Algo más?",promptEn:"The juice is blackberry. Anything else?",accept:["nada mas gracias","no nada mas gracias","eso es todo gracias"],hint:'Say "nothing else, thanks".'},{id:"a-r3",prompt:"Son tres dólares.",promptEn:"It's three dollars.",accept:["aqui tiene","aqui tiene gracias","gracias aqui esta"],hint:'Hand over the money: "Aquí tiene."'}],shadowing:["a-2","a-4","a-6"]},Xf={id:"charla",tier:2,cefr:"A2",title:"Charla rápida",goal:"Make small talk: where you're from, what you do, and how you like Ecuador.",culture:'Ecuadorians are warm and curious with visitors. Expect "¿De dónde eres?" and "¿Te gusta el Ecuador?" early on. Saying you find it "chévere" or "lindo" goes a long way. Note many say "el Ecuador" with the article.',dialogue:[{id:"c-1",speaker:"them",es:"¿De dónde eres?",en:"Where are you from?"},{id:"c-2",speaker:"you",es:"Soy de Estados Unidos, de California.",en:"I'm from the United States, from California."},{id:"c-3",speaker:"them",es:"¡Qué bueno! ¿A qué te dedicas?",en:"How nice! What do you do (for work)?"},{id:"c-4",speaker:"you",es:"Trabajo en tecnología. ¿Y tú?",en:"I work in tech. And you?"},{id:"c-5",speaker:"them",es:"Soy profesora. ¿Y te gusta el Ecuador?",en:"I'm a teacher. And do you like Ecuador?"},{id:"c-6",speaker:"you",es:"Me encanta. La gente es muy amable.",en:"I love it. The people are very kind."},{id:"c-7",speaker:"them",es:"¡Qué chévere! Bienvenido.",en:"How cool! Welcome."}],chunks:[{id:"c-c1",es:"¿De dónde eres?",en:"Where are you from?"},{id:"c-c2",es:"Soy de…",en:"I'm from…"},{id:"c-c3",es:"¿A qué te dedicas?",en:"What do you do (for work)?"},{id:"c-c4",es:"Me encanta",en:"I love it"},{id:"c-c5",es:"La gente es muy amable",en:"The people are very kind"}],vocab:[{id:"c-v1",es:"dónde",en:"where",pos:"adv."},{id:"c-v2",es:"trabajar",en:"to work",pos:"v."},{id:"c-v3",es:"la gente",en:"people",pos:"n."},{id:"c-v4",es:"amable",en:"kind / friendly",pos:"adj."},{id:"c-v5",es:"lindo",en:"lovely / pretty",pos:"adj."},{id:"c-v6",es:"gustar",en:"to please (to like)",pos:"v."},{id:"c-v7",es:"bienvenido",en:"welcome",pos:"adj."}],grammarNote:'"Me gusta / me encanta" literally mean "it pleases me / it delights me", so the thing liked is the subject: "me gusta el café" (coffee pleases me). For plurals: "me gustan los tacos". "Me encanta" is a stronger, very natural way to say you love something.',roleplay:[{id:"c-r1",prompt:"¿De dónde eres?",promptEn:"Where are you from?",accept:["soy de estados unidos","soy de california","soy de estados unidos de california"],hint:'Use "Soy de…" + your country/city.'},{id:"c-r2",prompt:"¿A qué te dedicas?",promptEn:"What do you do for work?",accept:["trabajo en tecnologia","trabajo en tecnologia y tu","soy ingeniero"],hint:'Use "Trabajo en…" + your field.'},{id:"c-r3",prompt:"¿Y te gusta el Ecuador?",promptEn:"And do you like Ecuador?",accept:["me encanta la gente es muy amable","me encanta","si me encanta"],hint:"Say you love it; the people are kind."}],shadowing:["c-2","c-4","c-6"]},Zf={id:"farmacia",tier:3,cefr:"B1",title:"En la farmacia",goal:"Describe a symptom, ask for something to treat it, and understand the dosage.",culture:`Pharmacies ("farmacias" or "boticas") are everywhere in Ecuador and pharmacists give a lot of informal advice. Many common medicines are available without a prescription ("sin receta"). You'll be asked "¿cada cuánto?" — how often to take it.`,dialogue:[{id:"f-1",speaker:"them",es:"Buenas, ¿en qué le puedo ayudar?",en:"Hello, how can I help you?"},{id:"f-2",speaker:"you",es:"Me duele la cabeza. ¿Tiene algo para el dolor?",en:"I have a headache. Do you have something for the pain?"},{id:"f-3",speaker:"them",es:"Sí, esto le va a ayudar. ¿Tiene receta?",en:"Yes, this will help you. Do you have a prescription?"},{id:"f-4",speaker:"you",es:"No, ¿se puede sin receta?",en:"No, can I get it without a prescription?"},{id:"f-5",speaker:"them",es:"Claro. Tome una pastilla cada ocho horas.",en:"Of course. Take one pill every eight hours."},{id:"f-6",speaker:"you",es:"Entendido. ¿Cuánto le debo?",en:"Understood. How much do I owe you?"},{id:"f-7",speaker:"them",es:"Tres dólares con cincuenta.",en:"Three dollars fifty."}],chunks:[{id:"f-c1",es:"Me duele…",en:"My … hurts / I have a … ache"},{id:"f-c2",es:"¿Tiene algo para…?",en:"Do you have something for…?"},{id:"f-c3",es:"¿Se puede sin receta?",en:"Can I get it without a prescription?"},{id:"f-c4",es:"cada ocho horas",en:"every eight hours"},{id:"f-c5",es:"Entendido",en:"Understood / got it"}],vocab:[{id:"f-v1",es:"la cabeza",en:"head",pos:"n."},{id:"f-v2",es:"el dolor",en:"pain",pos:"n."},{id:"f-v3",es:"la pastilla",en:"pill",pos:"n."},{id:"f-v4",es:"la receta",en:"prescription",pos:"n."},{id:"f-v5",es:"doler",en:"to hurt",pos:"v."},{id:"f-v6",es:"el estómago",en:"stomach",pos:"n."},{id:"f-v7",es:"la garganta",en:"throat",pos:"n."}],grammarNote:'"Doler" works like "gustar": the body part is the subject. "Me duele la cabeza" = "the head hurts to me". Plural body parts take "duelen": "me duelen los pies" (my feet hurt). Swap "me" for "le" to ask about someone else: "¿Le duele algo?"',roleplay:[{id:"f-r1",prompt:"Buenas, ¿en qué le puedo ayudar?",promptEn:"Hello, how can I help you?",accept:["me duele la cabeza tiene algo para el dolor","me duele la cabeza","tiene algo para el dolor de cabeza"],hint:"Say your head hurts and ask for something for the pain."},{id:"f-r2",prompt:"¿Tiene receta?",promptEn:"Do you have a prescription?",accept:["no se puede sin receta","no se puede sin receta","no tiene algo sin receta"],hint:"Say no, and ask if it's available without one."},{id:"f-r3",prompt:"Tome una pastilla cada ocho horas.",promptEn:"Take one pill every eight hours.",accept:["entendido cuanto le debo","entendido","entendido cuanto es"],hint:"Acknowledge and ask the price."}],shadowing:["f-2","f-4","f-6"]},ed={id:"greetings",tier:1,cefr:"A1",title:"Saludos y presentaciones",goal:"Greet someone, introduce yourself, and ask how they are — the Ecuadorian way.",culture:`On the Ecuadorian coast you'll constantly hear "¿Qué más?" as a casual "what's up?". "Buenas" works any time of day. "Chévere" and "bacán" both mean "cool / great".`,dialogue:[{id:"g-1",speaker:"them",es:"¡Buenas! ¿Qué más?",en:"Hi! What's up?",note:"Very common informal greeting in Ecuador."},{id:"g-2",speaker:"you",es:"Todo bien, gracias. ¿Y usted?",en:"All good, thanks. And you?"},{id:"g-3",speaker:"them",es:"Bien también. ¿Cómo te llamas?",en:"Good too. What's your name?"},{id:"g-4",speaker:"you",es:"Me llamo Alex. ¿Y usted?",en:"My name is Alex. And you?"},{id:"g-5",speaker:"them",es:"Yo soy María. Mucho gusto.",en:"I'm María. Nice to meet you."},{id:"g-6",speaker:"you",es:"El gusto es mío.",en:"The pleasure is mine."}],chunks:[{id:"g-c1",es:"¿Qué más?",en:"What's up? / How's it going?"},{id:"g-c2",es:"Todo bien, gracias",en:"All good, thanks"},{id:"g-c3",es:"¿Cómo te llamas?",en:"What's your name?",literal:"how yourself you-call"},{id:"g-c4",es:"Me llamo…",en:"My name is…",literal:"myself I-call"},{id:"g-c5",es:"Mucho gusto",en:"Nice to meet you"},{id:"g-c6",es:"El gusto es mío",en:"The pleasure is mine"}],vocab:[{id:"g-v1",es:"buenas",en:"hello (any time)",pos:"interj."},{id:"g-v2",es:"bien",en:"well / fine",pos:"adv."},{id:"g-v3",es:"gracias",en:"thank you",pos:"interj."},{id:"g-v4",es:"usted",en:"you (formal)",pos:"pron."},{id:"g-v5",es:"también",en:"too / also",pos:"adv."},{id:"g-v6",es:"chévere",en:"cool / great",pos:"adj."},{id:"g-v7",es:"gusto",en:"pleasure",pos:"n."}],grammarNote:'Ecuadorians often default to "usted" even with peers as a sign of warmth and respect, especially in the highlands (sierra). "tú" is also fine and common on the coast. When unsure, "usted" is the safe choice.',roleplay:[{id:"g-r1",prompt:"¡Buenas! ¿Qué más?",promptEn:"Hi! What's up?",accept:["todo bien gracias","todo bien gracias y usted","bien gracias","todo bien y usted"],hint:"Say you're all good and thank them."},{id:"g-r2",prompt:"¿Cómo te llamas?",promptEn:"What's your name?",accept:["me llamo alex","me llamo alex y usted","yo me llamo alex"],hint:'Use "Me llamo…" + your name.'},{id:"g-r3",prompt:"Yo soy María. Mucho gusto.",promptEn:"I'm María. Nice to meet you.",accept:["el gusto es mio","mucho gusto","igualmente"],hint:'Return the pleasure: "El gusto es mío."'}],shadowing:["g-1","g-2","g-3","g-5","g-6"]},td={id:"mercado",tier:1,cefr:"A1",title:"En el mercado",goal:"Ask prices, handle numbers and dollars, and buy fruit at the market.",culture:'Ecuador uses the US dollar, so prices are familiar. At markets you buy by "la libra" (pound) and you can gently bargain. A bag is "una funda". "¿A cómo está…?" means "how much is…?".',dialogue:[{id:"m-1",speaker:"you",es:"Buenas, ¿a cómo está la libra de tomate?",en:"Hello, how much is a pound of tomatoes?"},{id:"m-2",speaker:"them",es:"A un dólar la libra, casero.",en:"A dollar a pound, my friend.",note:'"casero/a" = regular customer; a friendly market address.'},{id:"m-3",speaker:"you",es:"¿Me da dos libras? Y una funda, por favor.",en:"Can you give me two pounds? And a bag, please."},{id:"m-4",speaker:"them",es:"Claro. Son dos dólares.",en:"Sure. That's two dollars."},{id:"m-5",speaker:"you",es:"¿No me hace una rebajita?",en:"Won't you give me a little discount?"},{id:"m-6",speaker:"them",es:"Le dejo en uno cincuenta. ¿Le doy algo más?",en:"I'll let you have it for one fifty. Anything else?"},{id:"m-7",speaker:"you",es:"No, gracias. Aquí tiene.",en:"No, thanks. Here you go."}],chunks:[{id:"m-c1",es:"¿A cómo está…?",en:"How much is…? (per unit)"},{id:"m-c2",es:"¿Me da…?",en:"Can you give me…?"},{id:"m-c3",es:"una funda",en:"a bag"},{id:"m-c4",es:"¿No me hace una rebajita?",en:"Won't you give me a little discount?"},{id:"m-c5",es:"Aquí tiene",en:"Here you go"}],vocab:[{id:"m-v1",es:"la libra",en:"pound (weight)",pos:"n."},{id:"m-v2",es:"el dólar",en:"dollar",pos:"n."},{id:"m-v3",es:"el tomate",en:"tomato",pos:"n."},{id:"m-v4",es:"la funda",en:"bag",pos:"n."},{id:"m-v5",es:"uno",en:"one",pos:"num."},{id:"m-v6",es:"dos",en:"two",pos:"num."},{id:"m-v7",es:"cincuenta",en:"fifty",pos:"num."},{id:"m-v8",es:"la rebaja",en:"discount",pos:"n."}],grammarNote:'Prices are read as plain numbers: "uno cincuenta" = $1.50, "dos veinticinco" = $2.25. The "-ita" ending in "rebajita" is a diminutive that softens the request and is extremely common in Ecuadorian speech ("un ratito", "ahorita").',roleplay:[{id:"m-r1",prompt:"¿Qué le doy, casero?",promptEn:"What can I get you, friend?",accept:["a como esta la libra de tomate","me da dos libras de tomate","a como esta el tomate"],hint:"Ask the price per pound, or ask for two pounds."},{id:"m-r2",prompt:"Son dos dólares.",promptEn:"That's two dollars.",accept:["no me hace una rebajita","me hace una rebajita","no me rebaja"],hint:"Politely ask for a little discount."},{id:"m-r3",prompt:"Le dejo en uno cincuenta. ¿Le doy algo más?",promptEn:"I'll let you have it for one fifty. Anything else?",accept:["no gracias aqui tiene","no gracias","nada mas gracias aqui tiene"],hint:"Decline and hand over the money."}],shadowing:["m-1","m-3","m-5"]},nd={id:"planes",tier:2,cefr:"A2",title:"Hacer planes",goal:"Invite someone out, agree on a time, and confirm the plan.",culture:'Ecuadorians often say "el finde" for the weekend and "dale" as a casual "okay/sounds good". "Nos vemos" ("see you") is the standard sign-off. Time is given on the hour with "a las…".',dialogue:[{id:"p-1",speaker:"them",es:"¿Qué haces el finde?",en:"What are you doing this weekend?"},{id:"p-2",speaker:"you",es:"
